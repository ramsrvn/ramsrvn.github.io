<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCI CERT Rules</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-beta.1/css/select2.min.css" rel="stylesheet" />
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Ensure all columns have equal width */
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            white-space: normal; /* Allow text to wrap */
            word-wrap: break-word; /* Break long words */
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .severity-high {
            background-color: #FA8072; /* Salmon */
            color: black;
        }
        .severity-medium {
            background-color: #FFA500; /* Tangerine */
            color: black;
        }
        .severity-low {
            background-color: #F0FFF0; /* HoneyDew */
            color: black;
        }
        .page-link {
            margin: 0 5px;
            text-decoration: none;
            color: #007bff;
        }
        .page-link.active {
            font-weight: bold;
            color: #0056b3;
        }
        .filter-container {
            margin-bottom: 20px;
        }
        .filter-container label {
            margin-right: 10px;
        }
        .filter-container select, .filter-container input {
            margin-right: 20px;
            width: 200px;
        }
        .no-results {
            text-align: center;
            font-weight: bold;
            color: red;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-beta.1/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <h1>SCI CERT RULES (Sorted by Severity)</h1>
    <div class="filter-container">
        <label>Category: <select id="filter-category"></select></label>
        <label>Description: <input type="text" id="filter-description"></label>
        <label>Rule: <input type="text" id="filter-rule"></label>
        <label>Severity: <select id="filter-severity"></select></label>
        <label>Likelihood: <select id="filter-likelihood"></select></label>
        <label>Remediation Cost: <select id="filter-remediation-cost"></select></label>
        <label>Priority: <select id="filter-priority"></select></label>
        <label>Level: <select id="filter-level"></select></label>
        <button onclick="applyFilters()">Apply Filters</button>
    </div>
    <div id="csv-table-container" style="overflow-x: auto;">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Rule</th>
                    <th>Severity</th>
                    <th>Likelihood</th>
                    <th>Remediation Cost</th>
                    <th>Priority</th>
                    <th>Level</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="no-results" class="no-results" style="display: none;">No results found.</div>
    </div>
    <div id="pagination" style="text-align: center; margin-top: 20px;"></div>

    <script>
        let allRows = [];

        async function loadCSV() {
            const response = await fetch('/sci-cert/sci-cert-coding-standard-rules.csv');
            const csvData = await response.text();
            
            Papa.parse(csvData, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allRows = results.data;
                    setDropdownOptions();
                    displayPage(1, allRows);
                },
                error: function(error) {
                    console.error('Error parsing CSV:', error);
                }
            });
        }

        function setDropdownOptions() {
            const categories = ["Arrays (ARR)", "Characters and Strings (STR)", "Concurrency (CON)", "Containers (CTR)", 
            "Declarations and Initialization (DCL)", "Environment (ENV)", "Error Handling (ERR)", 
            "Exceptions and Error Handling", "Expressions (EXP)", "File Input/Output (FIO)", 
            "Floating Point (FLP)", "Input Output (FIO)", "Integers (INT)", "Memory Management (MEM)", 
            "Miscellaneous (MSC)", "Object Oriented Programming (OOP)", "POSIX (POS)", 
            "Preprocessor (PRE)", "Signals (SIG)", "Windows (WIN)"];
            const severities = ["High", "Medium", "Low"];
            const likelihoods = ["Likely", "Probable", "Unlikely"];
            const remediationCosts = ["High", "Medium", "Low"];
            const priorities = ["P1", "P2", "P3", "P4", "P6", "P8", "P9", "P12", "P18", "P27"];
            const levels = ["L1", "L2", "L3"];

            populateDropdown('filter-category', categories);
            populateDropdown('filter-severity', severities);
            populateDropdown('filter-likelihood', likelihoods);
            populateDropdown('filter-remediation-cost', remediationCosts);
            populateDropdown('filter-priority', priorities);
            populateDropdown('filter-level', levels);

            $('.filter-container select').select2({
                maximumSelectionLength: 5,
                placeholder: "Select or type to search",
                allowClear: true
            });
        }

        function populateDropdown(id, options) {
            const select = document.getElementById(id);
            select.innerHTML = '<option></option>'; // Placeholder for select2
            options.forEach(option => {
                const opt = document.createElement('option');
                opt.value = option;
                opt.text = option;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const category = $('#filter-category').val();
            const description = $('#filter-description').val().toLowerCase();
            const rule = $('#filter-rule').val().toLowerCase();
            const severity = $('#filter-severity').val();
            const likelihood = $('#filter-likelihood').val();
            const remediationCost = $('#filter-remediation-cost').val();
            const priority = $('#filter-priority').val();
            const level = $('#filter-level').val();

            const filteredRows = allRows.filter(row => {
                return (
                    (!category || row.Category.toLowerCase().includes(category)) &&
                    (!description || row.Description.toLowerCase().includes(description)) &&
                    (!rule || row.Rule.toLowerCase().includes(rule)) &&
                    (!severity || row.Severity.toLowerCase().includes(severity)) &&
                    (!likelihood || row.Likelihood.toLowerCase().includes(likelihood)) &&
                    (!remediationCost || row['Remediation Cost'].toLowerCase().includes(remediationCost)) &&
                    (!priority || row.Priority.toLowerCase().includes(priority)) &&
                    (!level || row.Level.toLowerCase().includes(level))
                );
            });

            if (filteredRows.length === 0) {
                document.getElementById('no-results').style.display = 'block';
            } else {
                document.getElementById('no-results').style.display = 'none';
            }

            displayPage(1, filteredRows);
        }

        function displayPage(page, rows) {
            const table = document.getElementById('data-table').getElementsByTagName('tbody')[0];
            table.innerHTML = ''; // Clear existing rows

            const rowsPerPage = 10;
            const totalRows = rows.length;
            const totalPages = Math.ceil(totalRows / rowsPerPage);

            const start = (page - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, rows.length);
            const pageRows = rows.slice(start, end);

            pageRows.forEach(row => {
                const newRow = table.insertRow();
                let severityClass = '';
                if (row.Level.trim() === 'L1') severityClass = 'severity-high';
                if (row.Level.trim() === 'L2') severityClass = 'severity-medium';
                if (row.Level.trim() === 'L3') severityClass = 'severity-low';
                if (severityClass) newRow.classList.add(severityClass);
                Object.values(row).forEach(cell => {
                    const newCell = newRow.insertCell();
                    newCell.textContent = cell;
                });
            });

            displayPagination(totalPages, rows);
        }

        function displayPagination(totalPages, rows) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const pageLink = document.createElement('a');
                pageLink.href = '#';
                pageLink.textContent = i;
                pageLink.classList.add('page-link');
                if (i === 1) {
                    pageLink.classList.add('active');
                }
                pageLink.addEventListener('click', (event) => {
                    event.preventDefault();
                    document.querySelector('.page-link.active').classList.remove('active');
                     pageLink.classList.add('active');
                    displayPage(i, rows);
                });
                pagination.appendChild(pageLink);
            }
        }

        loadCSV().catch(error => console.error('Error loading CSV:', error));
    </script>
</body>
</html>
