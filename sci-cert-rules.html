<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCI CERT Rules</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Ensure all columns have fixed width */
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            white-space: normal; /* Allow text to wrap */
            word-wrap: break-word; /* Break long words */
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        th, td:nth-child(1) { width: 15%; } /* Adjust width as needed */
        th, td:nth-child(2) { width: 40%; } /* Adjust width as needed */
        th, td:nth-child(3), th, td:nth-child(4), th, td:nth-child(5), th, td:nth-child(6), th, td:nth-child(7), th, td:nth-child(8) { width: 10%; } /* Adjust width as needed */
        .severity-high {
            background-color: #FA8072; /* Salmon */
            color: black;
        }
        .severity-medium {
            background-color: #FFA500; /* Tangerine */
            color: black;
        }
        .severity-low {
            background-color: #F0FFF0; /* HoneyDew */
            color: black;
        }
        .page-link {
            margin: 0 5px;
            text-decoration: none;
            color: #007bff;
        }
        .page-link.active {
            font-weight: bold;
            color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>SCI CERT RULES (Sorted by Severity)</h1>
    <div id="csv-table-container" style="overflow-x: auto;">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Rule</th>
                    <th>Severity</th>
                    <th>Likelihood</th>
                    <th>Remediation Cost</th>
                    <th>Priority</th>
                    <th>Level</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div id="pagination" style="text-align: center; margin-top: 20px;"></div>

    <script>
        async function loadCSV() {
            const response = await fetch('/sci-cert/sci-cert-coding-standard-rules.csv');
            const data = await response.text();
            const rows = data.split('\n').map(row => row.split(','));

            let currentPage = 1;
            const rowsPerPage = 10;
            const totalRows = rows.length - 1; // Exclude header row
            const totalPages = Math.ceil(totalRows / rowsPerPage);

            function displayPage(page) {
                const table = document.getElementById('data-table').getElementsByTagName('tbody')[0];
                table.innerHTML = ''; // Clear existing rows

                const start = (page - 1) * rowsPerPage + 1; // Skip header row
                const end = Math.min(start + rowsPerPage, rows.length);
                const pageRows = rows.slice(start, end);

                pageRows.forEach((row, rowIndex) => {
                    if (row.length < 8) {
                        console.warn(`Skipping row ${rowIndex + start}: insufficient columns`);
                        return;
                    }
                    const newRow = table.insertRow();
                    let severityClass = '';
                    if (row[7] && row[7].trim() === 'L1') severityClass = 'severity-high';
                    if (row[7] && row[7].trim() === 'L2') severityClass = 'severity-medium';
                    if (row[7] && row[7].trim() === 'L3') severityClass = 'severity-low';
                    if (severityClass) newRow.classList.add(severityClass);
                    row.forEach((cell, cellIndex) => {
                        const newCell = newRow.insertCell();
                        newCell.textContent = cell;
                    });
                });

                displayPagination();
            }

            function displayPagination() {
                const pagination = document.getElementById('pagination');
                pagination.innerHTML = '';

                for (let i = 1; i <= totalPages; i++) {
                    const pageLink = document.createElement('a');
                    pageLink.href = '#';
                    pageLink.textContent = i;
                    pageLink.classList.add('page-link');
                    if (i === currentPage) {
                        pageLink.classList.add('active');
                    }
                    pageLink.addEventListener('click', (event) => {
                        event.preventDefault();
                        currentPage = i;
                        displayPage(currentPage);
                    });
                    pagination.appendChild(pageLink);
                }
            }

            displayPage(currentPage);
        }
        loadCSV().catch(error => console.error('Error loading CSV:', error));
    </script>
</body>
</html>
